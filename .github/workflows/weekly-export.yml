name: Weekly Export

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-export

jobs:
  export-bond-company-ratings:
    name: Export bond company ratings
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      T_INVEST_READONLY_TOKEN: ${{ secrets.T_INVEST_READONLY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment file
        run: |
          if [ -z "${T_INVEST_READONLY_TOKEN}" ]; then
            echo "T_INVEST_READONLY_TOKEN secret is not set."
            exit 1
          fi

          cat <<EOF > .env
          T_INVEST_READONLY_TOKEN=${T_INVEST_READONLY_TOKEN}
          EOF

      - name: Export bond company ratings
        run: |
          npm run export:bondCompanyRatings

      - name: Upload bond company ratings export
        uses: actions/upload-artifact@v4
        with:
          name: bond-company-ratings-export
          path: exports/bondCompanyRatings.json
          if-no-files-found: error

  export-bond-ratings:
    name: Export bond ratings
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      T_INVEST_READONLY_TOKEN: ${{ secrets.T_INVEST_READONLY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare environment file
        run: |
          if [ -z "${T_INVEST_READONLY_TOKEN}" ]; then
            echo "T_INVEST_READONLY_TOKEN secret is not set."
            exit 1
          fi

          cat <<EOF > .env
          T_INVEST_READONLY_TOKEN=${T_INVEST_READONLY_TOKEN}
          EOF

      - name: Export bond ratings
        run: |
          npm run export:bondRatings

      - name: Upload bond ratings export
        uses: actions/upload-artifact@v4
        with:
          name: bond-ratings-export
          path: exports/bondRatings.json
          if-no-files-found: error

  commit-exports:
    name: Commit and push exports if changed
    runs-on: ubuntu-latest
    needs:
      - export-bond-company-ratings
      - export-bond-ratings

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download bond company ratings export
        uses: actions/download-artifact@v4
        with:
          name: bond-company-ratings-export
          path: exports

      - name: Download bond ratings export
        uses: actions/download-artifact@v4
        with:
          name: bond-ratings-export
          path: exports

      - name: Commit and push exports if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/bondCompanyRatings.json exports/bondRatings.json

          if git diff --cached --quiet; then
            echo "No export changes detected."
            exit 0
          fi

          git commit -m "chore(exports): daily bond ratings update"
          git push
