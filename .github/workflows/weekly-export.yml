name: Weekly Export

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: weekly-export

jobs:
  export-issuers:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      T_INVEST_READONLY_TOKEN: ${{ secrets.T_INVEST_READONLY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export data
        run: |
          npm run export:issuers

      - name: Upload bond company ratings export
        uses: actions/upload-artifact@v4
        with:
          name: issuers-export
          path: exports/issuers.json.br
          if-no-files-found: error

  export-bonds:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      T_INVEST_READONLY_TOKEN: ${{ secrets.T_INVEST_READONLY_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export data
        run: |
          npm run export:bonds

      - name: Upload bond ratings export
        uses: actions/upload-artifact@v4
        with:
          name: bonds-export
          path: exports/bonds.json.br
          if-no-files-found: error

  commit-exports:
    name: Commit and push exports if changed
    runs-on: ubuntu-latest
    needs:
      - export-issuers
      - export-bonds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download bond company ratings export
        uses: actions/download-artifact@v4
        with:
          name: issuers-export
          path: exports

      - name: Download bond ratings export
        uses: actions/download-artifact@v4
        with:
          name: bonds-export
          path: exports

      - name: Commit and push exports if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/issuers.json.br exports/bonds.json.br

          if git diff --cached --quiet; then
            echo "No export changes detected."
            exit 0
          fi

          git commit -m "chore(exports): weekly bond ratings update"
          git push
